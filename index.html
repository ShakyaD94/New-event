<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Software Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #f4f7f9; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { color: #007cba; }
        button { background: #007cba; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #005a87; }
        #log { background: #222; color: #0f0; padding: 15px; margin-top: 20px; border-radius: 4px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Restaurant Industry Insights</h2>
        <p>Topic: <strong>Labor Cost Trends 2025</strong></p>
        <button onclick="trackArticleEvent('Labor Cost Trends 2025')">Read Full Article</button>
        
        <div id="log">Status: Ready to track...</div>
    </div>

    <script>
        // Mautic Loader
        (function(w,d,t,u,n,a,m){
            w['MauticTrackingObject']=n;
            w[n]=w[n]||function(){(w[n].q=w[n].q||[]).push(arguments)},
            a=d.createElement(t),
            m=d.getElementsByTagName(t)[0];
            a.async=1; a.src=u; m.parentNode.insertBefore(a,m)
        })(window,document,'script','https://d2.altametrics.com/mtc.js','mt');

        function trackArticleEvent(title) {
            const status = document.getElementById('log');
            
            // 1. Send formal event for Reports/Automation
            mt('send', 'event', {
                category: 'Content',
                action: 'Article Read',
                name: title
            });

            // 2. Send UI override for the Contact Timeline
            mt('send', 'pageview', {
                'mt_event': title,          // Header
                'Category': 'Content',      // Custom Row 1
                'Action': 'Article Read',    // Custom Row 2
                'page_title': title,
                'page_url': window.location.href + "?t=" + Date.now()
            });

            status.innerHTML = `[${new Date().toLocaleTimeString()}] ✅ Event Sent: ${title}`;
        }
    </script>
</body>
</html>
