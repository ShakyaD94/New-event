<!DOCTYPE html>
<html>
<head>
    <title>GitLab to Mautic Event Tracker dshakya</title>

    <!-- 1. Mautic Tracking Script (Standard) -->
    <<script>
(function(w,d,t,u,n,a,m){
 
    w['MauticTrackingObject']=n;
 
    w[n]=w[n]||function(){
        (w[n].q=w[n].q||[]).push(arguments)
    };
 
    a=d.createElement(t);
    m=d.getElementsByTagName(t)[0];
 
    a.async=1;
    a.src=u;
 
    a.onload = function() {
 
        console.log('Mautic Loaded');
 
        // STEP 1: IDENTIFY CONTACT
        mt('send', 'identify', {
            email: 'test@example.com',
            firstname: 'Test',
            lastname: 'User'
        });
 
        // STEP 2: SEND PAGEVIEW
        mt('send', 'pageview');
 
        // STEP 3: SEND CUSTOM TRACKING
        setTimeout(function(){
 
            history.pushState({}, '', '/event/add-to-cart');
 
            mt('send', 'pageview');
 
            console.log('Custom Event Sent');
 
        }, 2000);
 
    };
 
    m.parentNode.insertBefore(a,m);
 
})(window,document,'script','https://d2.altametrics.com/mtc.js','mt');
</script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>Event Sent!</h2>
        <p>The "Article Read" event for <strong>Labor Cost Trends 2025</strong> has been dispatched to Mautic.</p>
    </div>
</body>
</html>
