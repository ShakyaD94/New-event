<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Insights Portal</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        .section { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        button { background: #007cba; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
        #log { background: #333; color: #0f0; padding: 10px; font-family: monospace; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

    <h1>Restaurant Industry Insights</h1>

    <div class="section">
        <h2>Latest Research</h2>
        <p>Labor Cost Trends 2025: Analysis for POS Managers.</p>
        <button onclick="trackArticle('Labor Cost Trends 2025')">Read Article</button>
    </div>

    <div class="section">
        <h2>Quick Actions</h2>
        <button onclick="restaurantTrack('Purchase Made', {amount: 199.00})">Purchase POS</button>
    </div>

    <div id="log">Waiting for interaction...</div>

    <script>
        (function(w,d,t,u,n,a,m){
            w['MauticTrackingObject']=n;
            w[n]=w[n]||function(){(w[n].q=w[n].q||[]).push(arguments)},
            a=d.createElement(t),
            m=d.getElementsByTagName(t)[0];
            a.async=1; a.src=u; m.parentNode.insertBefore(a,m)
        })(window,document,'script','https://d2.altametrics.com/mtc.js','mt');

        function log(msg) {
            document.getElementById('log').innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        }

        // 1. Your specific request: The 'Event' type track
        function trackArticle(title) {
            // This sends the data as a formal Mautic Event
            mt('send', 'event', {
                category: 'Content',
                action: 'Article Read',
                name: title
            });

            // ALSO: Send as pageview so it appears in your Timeline UI as you expect
            mt('send', 'pageview', {
                'mt_event': 'Article Read',
                'page_title': title,
                'page_url': window.location.origin + window.location.pathname + "?article=" + title.replace(/\s+/g, '_') + "&t=" + Date.now()
            });

            log(`Sent Article Event: ${title}`);
        }

        // 2. Standard Restaurant Action
        function restaurantTrack(eventName, data) {
            const ts = Date.now();
            const params = new URLSearchParams(data).toString();
            const cleanUrl = window.location.origin + window.location.pathname + "?" + params + "&t=" + ts;

            for (let key in data) { mt('set', key, data[key]); }

            mt('send', 'pageview', {
                'mt_event': eventName,
                'page_title': eventName, 
                'page_url': cleanUrl,
                ...data
            });
            log(`Sent: ${eventName}`);
        }
    </script>
</body>
</html>
